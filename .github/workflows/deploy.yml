name: Deploy to Hostinger

# Trigger: any push to the main branch
on:
  push:
    branches: [main]
  # Also allow manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the latest code from the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js (matches the version used locally)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Install dependencies (using lockfile for reproducible builds)
      - name: Install dependencies
        run: npm ci

      # 4. Build the static site into ./dist/
      #    PUBLIC_FORMSPREE_ID is baked into the contact form at build time;
      #    set it as a GitHub Actions secret of the same name.
      - name: Build site
        run: npm run build
        env:
          PUBLIC_FORMSPREE_ID: ${{ secrets.PUBLIC_FORMSPREE_ID }}

      # 5. Sync ./dist/ to Hostinger via FTPS.
      #    The action only uploads files that changed since the last
      #    deploy (it tracks state via .ftp-deploy-sync-state.json on
      #    the server), so subsequent deploys are fast.
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /domains/kudare.co/public_html/
          # Don't trip on the state file or any vestigial git/node bits
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
