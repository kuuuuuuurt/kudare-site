<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kudare — strategic intelligence &amp; decision systems</title>
  <link rel="stylesheet" href="site.css" />
  <link rel="stylesheet" href="quirk.css" />
  <link rel="stylesheet" href="specimen.css" />
  <link rel="icon" href="assets/kudare-mark.svg" />
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="quirk.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="specimen.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SECTIONS = [
      { id: "top",       folio: "00", label: "Opening" },
      { id: "offerings", folio: "01", label: "What we build" },
      { id: "method",    folio: "02", label: "The method" },
      { id: "work",      folio: "03", label: "Selected work" },
      { id: "notes",     folio: "04", label: "Field Notes" },
      { id: "contact",   folio: "05", label: "Start a conversation" },
    ];

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "folios": true,
      "grid": true,
      "marginalia": true,
      "animSwipe": true,
      "heroMotion": true,
      "ledger": true,
      "ribbon": true,
      "ribbonMode": "services",
      "heroMode": "statement"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [active, setActive] = useState("offerings");
      const [modal, setModal] = useState(false);

      const go = (id) => {
        if (id === "top") { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
        const el = document.getElementById(id);
        if (el) {
          const y = el.getBoundingClientRect().top + window.scrollY - 72;
          window.scrollTo({ top: y, behavior: "smooth" });
        }
      };

      // Reflect every tweak onto <html> as a data-attr for the CSS to key off.
      useEffect(() => {
        const r = document.documentElement;
        r.dataset.folios     = t.folios ? "on" : "off";
        r.dataset.grid       = t.grid ? "on" : "off";
        r.dataset.marginalia = t.marginalia ? "on" : "off";
        r.dataset.animswipe  = t.animSwipe ? "on" : "off";
        r.dataset.heromotion = t.heroMotion ? "on" : "off";
        r.dataset.ribbon     = t.ribbon ? "on" : "off";
      }, [t]);

      // Active-section tracking for the nav.
      useEffect(() => {
        const ids = ["offerings", "method", "work", "notes"];
        const onScroll = () => {
          const mid = window.scrollY + window.innerHeight * 0.35;
          let cur = ids[0];
          for (const id of ids) {
            const el = document.getElementById(id);
            if (el && el.offsetTop <= mid) cur = id;
          }
          setActive(cur);
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      // The swipe is a verb: draw each highlighter stroke on as it enters view.
      useEffect(() => {
        const marks = [...document.querySelectorAll(".swipe")];
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) e.target.dataset.marked = "1"; });
        }, { threshold: 0.2, rootMargin: "0px 0px -8% 0px" });
        marks.forEach((m) => io.observe(m));
        // Guarantee anything already on screen at mount draws on.
        const seed = () => marks.forEach((m) => {
          const r = m.getBoundingClientRect();
          if (r.top < window.innerHeight * 0.9 && r.bottom > 0) m.dataset.marked = "1";
        });
        requestAnimationFrame(() => requestAnimationFrame(seed));
        return () => io.disconnect();
      }, [t.ledger]);

      useEffect(() => { document.body.style.overflow = modal ? "hidden" : ""; }, [modal]);

      const openContact = () => setModal(true);

      return (
        <React.Fragment>
          {t.grid && <div className="grid-overlay" aria-hidden="true"></div>}
          <SiteNav active={active} onNav={go} onContact={openContact} />
          {t.heroMode === "specimen"
            ? <SpecimenHero onContact={openContact} onNav={go} />
            : <Hero onContact={openContact} onNav={go} />}
          <FeedRibbon mode={t.ribbonMode} />
          <Offerings onContact={openContact} ledger={t.ledger} />
          <MethodPOV />
          <CaseIndex />
          <FieldNotes />
          <ContactCTA />
          <Footer onNav={go} />
          <ContactModal open={modal} onClose={() => setModal(false)} />

          <TweaksPanel>
            <TweakSection label="Homepage" />
            <TweakRadio label="Hero" value={t.heroMode} options={["specimen", "statement"]} onChange={(v) => setTweak("heroMode", v)} />
            <TweakSection label="Marked-up document" />
            <TweakToggle label="Section register marks" value={t.folios} onChange={(v) => setTweak("folios", v)} />
            <TweakToggle label="Baseline + column grid" value={t.grid} onChange={(v) => setTweak("grid", v)} />
            <TweakToggle label="Marginalia" value={t.marginalia} onChange={(v) => setTweak("marginalia", v)} />
            <TweakSection label="The hand, in motion" />
            <TweakToggle label="Swipe draws on" value={t.animSwipe} onChange={(v) => setTweak("animSwipe", v)} />
            <TweakToggle label="Hero mark motion" value={t.heroMotion} onChange={(v) => setTweak("heroMotion", v)} />
            <TweakSection label="Layout & content" />
            <TweakToggle label="Offerings as ledger" value={t.ledger} onChange={(v) => setTweak("ledger", v)} />
            <TweakToggle label="Ribbon" value={t.ribbon} onChange={(v) => setTweak("ribbon", v)} />
            <TweakRadio label="Ribbon reads" value={t.ribbonMode} options={["services", "clients"]} onChange={(v) => setTweak("ribbonMode", v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
